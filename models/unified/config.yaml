model:
  name: roberta-base
  dropout: 0.1
  lambda_token: 0.3        # weight of epistemic token-head loss relative to sentence-head loss
  bias_task_type: binary_classification
  bias_num_classes: 2
  bias_datasets:
    - {dataset_id: 10_BABE,      label_col: label}
    - {dataset_id: 75_RedditBias, label_col: label}
    - {dataset_id: 9_BASIL,      label_col: label, remap: {0: 1, 1: 1, 2: 0}}
    - {dataset_id: 03_CW_HARD,   label_col: label}
  # Kept for backward compat (predict.py label-name lookup, single-dataset fallback):
  bias_dataset:   10_BABE
  bias_label_col: label
  emotion_num_labels: 11

data:
  # Epistemic corpora (same paths as models/epistemic/config.yaml)
  wiki_xml:            /mldata/ece283-sentiment-analyzer/epistemic/raw/uncertainty/wiki.xml
  szeged_factbank_xml: /mldata/ece283-sentiment-analyzer/epistemic/raw/uncertainty/factbank.xml
  factbank_ldc_ann:    /mldata/ece283-sentiment-analyzer/epistemic/raw/factbank_ldc/data/annotation
  # Bio corpora omitted — out-of-domain for news-focused unified model
  bio_xmls:      []
  bioscope_xmls: []
  bio_token_weight: 0.0

  # Shared
  magpie_data_dir: /mldata/ece283-sentiment-analyzer
  cache_dir: /mldata/ece283-sentiment-analyzer
  hf_cache_dir: /mldata/ece283-sentiment-analyzer/hf_cache
  max_len: 128
  seed: 42
  train_frac: 0.80
  val_frac: 0.10

training:
  seed: 42
  batch_size: 16
  num_workers: 4
  encoder_lr: 2.0e-5
  head_lr: 1.0e-4
  weight_decay: 0.01
  epochs: 20           # ceiling; early stopping will usually halt sooner
  early_stopping:
    patience: 3        # epochs without composite improvement before stopping
    min_delta: 0.001   # minimum composite gain to count as improvement
  warmup_frac: 0.10
  fp16: true
  grad_clip: 1.0
  grad_accum_steps: 4      # effective batch size = 64

  # Per-task loss weights — emotion down-weighted due to ~10x dataset size
  task_weights:
    epistemic: 1.0
    bias:      1.0
    emotion:   0.5

  checkpoint_dir: runs/unified/

  # Warm-start from pretrained individual-task checkpoints.
  # Set each path to enable; leave null to train that component from scratch.
  warm_start:
    epistemic: /mldata/ece283-sentiment-analyzer/runs/epistemic/best.pt   # path to epistemic best.pt
    bias:      /mldata/ece283-sentiment-analyzer/runs/bias/best.pt   # path to bias best.pt
    emotion:   /mldata/ece283-sentiment-analyzer/runs/emotion/   # path to emotion HF checkpoint directory

logging:
  wandb_project: ece283-unified
  wandb_entity: ece283-sentiment-analyzer # set to your W&B username or team name
  log_every_n_steps: 50     # how often to push step-level metrics to W&B
